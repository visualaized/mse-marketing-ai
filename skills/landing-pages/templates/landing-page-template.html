<!DOCTYPE html>
<html lang="de" data-title-de="{{PAGE_TITLE_DE}}" data-title-en="{{PAGE_TITLE_EN}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PAGE_TITLE_DE}}</title>
<style>

  /* ============================================================
     MSE Filterpressen GmbH — Landing Page Template
     Selbstständige, responsive Single-File-HTML — inkl. DE/EN-Sprachumschalter
     (kein zweiter Domain-/Subdomain-Aufruf nötig, siehe .lang-switch unten).
     Farben ausschließlich aus brand/color-palette.json:
       Fast White      #FFFFFF
       Light Grey      #F5F5F5
       MSE Blue        #3498DB  (Akzent, max. 10-15%)
       Anthracite Black #1B1B1B
       Dark Grey       #3A3A3A
       Medium Grey     #707070
       Hairline        #E2E2E2
     Font: 'Nudica', Arial, sans-serif. Da diese Seite als EINZELNE, in sich
     geschlossene Datei auf eine Subdomain hochgeladen wird (kein Zugriff auf
     brand/fonts/ zur Laufzeit), wird die echte Nudica-Schrift als Base64-
     Data-URI eingebettet (siehe {{FONT_DATA_URI_REGULAR}}/{{FONT_DATA_URI_BOLD}}
     unten) — das ist der Standardweg für dieses Template, kein Sonderfall.
     ============================================================ */

  @font-face {
    font-family: 'Nudica';
    src: url('{{FONT_DATA_URI_REGULAR}}') format('opentype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Nudica';
    src: url('{{FONT_DATA_URI_BOLD}}') format('opentype');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  * { box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    padding: 0;
    font-family: 'Nudica', Arial, sans-serif;
    color: #3A3A3A;
    background-color: #FFFFFF;
    -webkit-font-smoothing: antialiased;
  }

  img { max-width: 100%; display: block; }

  a { text-decoration: none; }

  .eyebrow {
    font-size: 12px;
    line-height: 16px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #707070;
    margin: 0 0 16px 0;
    font-weight: 700;
  }

  .eyebrow--on-dark { color: #C9C9C9; text-shadow: 0 1px 8px rgba(0,0,0,0.6); }

  h1, h2, h3 {
    font-family: 'Nudica', Arial, sans-serif;
    font-weight: 700;
    margin: 0;
  }

  /* Sentence case enforced by content, never uppercase via CSS on headlines */
  h1 { font-size: 34px; line-height: 42px; color: #1B1B1B; }
  h2 { font-size: 30px; line-height: 38px; color: #1B1B1B; }
  h3 { font-size: 19px; line-height: 26px; color: #1B1B1B; }

  p { margin: 0; font-size: 16px; line-height: 27px; color: #3A3A3A; }

  .section {
    padding: 72px 24px;
  }

  .section--light { background-color: #FFFFFF; }
  .section--grey  { background-color: #F5F5F5; }

  .container {
    max-width: 1080px;
    margin: 0 auto;
  }

  .center-block {
    max-width: 680px;
    margin: 0 auto;
    text-align: center;
  }

  .hairline {
    border: none;
    border-top: 1px solid #E2E2E2;
    margin: 0 auto;
    max-width: 1080px;
  }

  /* ---------- Persistente Logo-Leiste (brand-guidelines.md §7: "Logo oben links") ---------- */
  /* Nutzt das blaue 3-Streifen-Bildzeichen (logo/MSE Favicon.png) statt der vollen Wortmarke,
     weil es auf JEDEM Hintergrund (hell wie dunkel) funktioniert — die volle Wortmarke ist
     dunkel/transparent und hätte auf dem dunklen Hero keinen Kontrast (kein Weiß-Logo-Asset
     vorhanden). Die volle Wortmarke erscheint stattdessen im hellen Footer (siehe unten). */
  .brandbar {
    position: fixed;
    top: 28px;
    left: 28px;
    z-index: 30;
  }
  .brandbar img { width: 28px; height: auto; display: block; }

  /* ---------- Sprachumschalter (persistente UI, brand-guidelines.md §7: "rechte Kontakt-Rail
     (Sprache/Globus, Telefon, Mail)" — dasselbe Muster wie auf der Live-Website, hier auf die
     Sprachfunktion reduziert). Immer sichtbar (position: fixed), unabhängig vom Scroll-Stand;
     kein Overlay über dem Hero-Bild — nur ein kleines, in sich geschlossenes UI-Element mit
     eigenem dezentem Anthrazit-Chip-Hintergrund für Lesbarkeit auf jedem Untergrund. Schaltet
     zwischen Deutsch und Englisch OHNE zweite Domain/Subdomain — beide Sprachversionen liegen
     bereits im selben HTML-Dokument (siehe [data-de]/[data-en]-Platzhalter + Script am Seitenende). */
  .lang-switch {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 30;
    display: flex;
    align-items: center;
    gap: 8px;
    background-color: rgba(27, 27, 27, 0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 999px;
    padding: 8px 14px;
  }

  .lang-switch__icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .lang-switch__btn {
    appearance: none;
    background: none;
    border: none;
    padding: 2px 4px;
    font-family: 'Nudica', Arial, sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #9A9A9A;
    cursor: pointer;
  }

  .lang-switch__btn[aria-pressed="true"] {
    color: #FFFFFF;
  }

  .lang-switch__btn:focus-visible {
    outline: 1px solid #3498DB;
    outline-offset: 2px;
    border-radius: 3px;
  }

  .lang-switch__sep {
    color: #5A5A5A;
    font-size: 12px;
  }

  /* [data-de]/[data-en] werden per Script befüllt (textContent) — bis das Script läuft, bleiben
     sie leer; kein FOUC-Risiko, da beide Varianten ohnehin nur als Attribut vorliegen, nicht als
     sichtbares Element. */

  /* ---------- Hero (Dark) ---------- */

  .hero {
    position: relative;
    min-height: 100vh;
    background-color: #1B1B1B;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    padding: 120px 24px 80px 24px;
  }

  /* Kein flächiges Overlay über dem Bild — das Hero-Bild wird in voller Sichtbarkeit gezeigt
     (die Bilder aus bild-video-generierung sind bereits dunkle Editorial-Aufnahmen mit bewusst
     reservierter Freifläche für die Headline, siehe dortiger Prompt-Aufbau). Lesbarkeit der weißen
     Schrift wird stattdessen über einen dezenten text-shadow gelöst, nicht über eine Abdunkelung
     des gesamten Bilds. */
  .hero__bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .hero__content {
    position: relative;
    z-index: 2;
    max-width: 780px;
    margin: 0 auto;
  }

  .hero__headline {
    color: #FFFFFF;
    font-size: 40px;
    line-height: 50px;
    text-shadow: 0 2px 16px rgba(0,0,0,0.55);
  }

  .hero__scroll {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .hero__scroll-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #C9C9C9;
  }

  .hero__scroll-arrow {
    width: 22px;
    height: 22px;
    border-right: 1px solid #FFFFFF;
    border-bottom: 1px solid #FFFFFF;
    transform: rotate(45deg);
    animation: mse-scroll-bounce 2.2s ease-in-out infinite;
    opacity: 0.85;
  }

  @keyframes mse-scroll-bounce {
    0%, 100% { transform: rotate(45deg) translate(0, 0); }
    50%      { transform: rotate(45deg) translate(6px, 6px); }
  }

  /* ---------- Split Layout ---------- */

  .split {
    display: flex;
    flex-direction: column;
    gap: 0;
    background-color: #FFFFFF;
  }

  .split__text {
    padding: 64px 24px;
    display: flex;
    align-items: center;
  }

  .split__text-inner {
    max-width: 460px;
    margin: 0 auto;
  }

  .split__image {
    width: 100%;
    height: 320px;
  }

  .split__image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* ---------- Feature Cards ---------- */

  .features {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    margin-top: 56px;
  }

  .feature-card {
    background-color: #F5F5F5;
    padding: 36px 28px;
    text-align: left;
  }

  .feature-card h3 { margin-bottom: 12px; }

  .feature-card p { color: #3A3A3A; }

  /* ---------- Buttons ---------- */

  .btn-solid {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background-color: #1B1B1B;
    color: #FFFFFF;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 700;
    padding: 18px 30px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
  }

  .btn-solid__arrow {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid #FFFFFF;
    font-size: 13px;
    line-height: 1;
  }

  .btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    color: #1B1B1B;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 700;
    padding: 10px 4px;
  }

  .btn-ghost__arrow {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid #1B1B1B;
    font-size: 14px;
    line-height: 1;
  }

  /* ---------- CTA Section ---------- */

  .cta-section {
    background-color: #F5F5F5;
    text-align: center;
    padding: 88px 24px;
  }

  .cta-section h2 { margin-bottom: 32px; }

  /* ---------- Footer ---------- */

  .footer {
    background-color: #FFFFFF;
    padding: 40px 24px 48px 24px;
    border-top: 1px solid #E2E2E2;
  }

  .footer p {
    max-width: 1080px;
    margin: 0 auto;
    font-size: 12px;
    line-height: 20px;
    color: #707070;
    text-align: center;
  }

  /* ============================================================
     Responsive — Desktop breakpoint ab 768px
     ============================================================ */

  @media (min-width: 768px) {

    .section { padding: 100px 40px; }

    h1 { font-size: 52px; line-height: 62px; }
    h2 { font-size: 38px; line-height: 46px; }

    .hero__headline { font-size: 56px; line-height: 66px; }

    .split {
      flex-direction: row;
      min-height: 520px;
    }

    .split__text,
    .split__image {
      width: 50%;
    }

    .split__image {
      height: auto;
    }

    .split--reverse {
      flex-direction: row-reverse;
    }

    .features {
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }

    .feature-card { padding: 44px 32px; }
  }

</style>
</head>
<body>

  <!-- ============================================================
       PERSISTENTE LOGO-LEISTE
       ============================================================ -->
  <div class="brandbar">
    <img src="{{LOGO_ICON_URL}}" alt="MSE Filterpressen">
  </div>

  <!-- ============================================================
       SPRACHUMSCHALTER (immer sichtbar, oben rechts, DE/EN ohne
       zweite Domain/Subdomain — siehe Script am Seitenende)
       ============================================================ -->
  <div class="lang-switch" role="group" aria-label="Sprache w&auml;hlen / Choose language">
    <svg class="lang-switch__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="12" cy="12" r="9" stroke="#FFFFFF" stroke-width="1.4"/>
      <ellipse cx="12" cy="12" rx="4" ry="9" stroke="#FFFFFF" stroke-width="1.4"/>
      <line x1="3" y1="12" x2="21" y2="12" stroke="#FFFFFF" stroke-width="1.4"/>
    </svg>
    <button type="button" class="lang-switch__btn" data-set-lang="de" aria-pressed="true">DE</button>
    <span class="lang-switch__sep" aria-hidden="true">|</span>
    <button type="button" class="lang-switch__btn" data-set-lang="en" aria-pressed="false">EN</button>
  </div>

  <!-- ============================================================
       HERO (Dark)
       ============================================================ -->
  <section class="hero">
    <img class="hero__bg" src="{{HERO_IMAGE_URL}}" alt="">
    <div class="hero__content">
      <p class="eyebrow eyebrow--on-dark" data-de="{{HERO_EYEBROW_DE}}" data-en="{{HERO_EYEBROW_EN}}"></p>
      <h1 class="hero__headline" data-de="{{HERO_HEADLINE_DE}}" data-en="{{HERO_HEADLINE_EN}}"></h1>
    </div>
    <div class="hero__scroll">
      <span class="hero__scroll-label" data-de="Nach unten scrollen" data-en="Scroll down"></span>
      <span class="hero__scroll-arrow" aria-hidden="true"></span>
    </div>
  </section>

  <!-- ============================================================
       PROBLEM / KONTEXT (Light Content Section)
       ============================================================ -->
  <section class="section section--light">
    <div class="container center-block">
      <p class="eyebrow" data-de="{{PROBLEM_EYEBROW_DE}}" data-en="{{PROBLEM_EYEBROW_EN}}"></p>
      <h2 data-de="{{PROBLEM_HEADLINE_DE}}" data-en="{{PROBLEM_HEADLINE_EN}}"></h2>
      <p style="margin-top: 24px;" data-de="{{PROBLEM_BODY_DE}}" data-en="{{PROBLEM_BODY_EN}}"></p>
    </div>
  </section>

  <hr class="hairline">

  <!-- ============================================================
       LÖSUNG / PRODUKT (Split Layout — Text / Bild)
       ============================================================ -->
  <section class="split">
    <div class="split__text">
      <div class="split__text-inner">
        <h2 data-de="{{SOLUTION_HEADLINE_DE}}" data-en="{{SOLUTION_HEADLINE_EN}}"></h2>
        <p style="margin-top: 20px;" data-de="{{SOLUTION_BODY_DE}}" data-en="{{SOLUTION_BODY_EN}}"></p>
      </div>
    </div>
    <div class="split__image">
      <img src="{{SOLUTION_IMAGE_URL}}" alt="{{SOLUTION_HEADLINE_DE}}">
    </div>
  </section>

  <!-- ============================================================
       BENEFITS / FEATURES (3-Spalten-Cards)
       ============================================================ -->
  <section class="section section--grey">
    <div class="container">
      <p class="eyebrow" style="text-align:center;" data-de="{{FEATURES_EYEBROW_DE}}" data-en="{{FEATURES_EYEBROW_EN}}"></p>
      <div class="features">

        <div class="feature-card">
          <h3 data-de="{{FEATURE_1_TITLE_DE}}" data-en="{{FEATURE_1_TITLE_EN}}"></h3>
          <p data-de="{{FEATURE_1_TEXT_DE}}" data-en="{{FEATURE_1_TEXT_EN}}"></p>
        </div>

        <div class="feature-card">
          <h3 data-de="{{FEATURE_2_TITLE_DE}}" data-en="{{FEATURE_2_TITLE_EN}}"></h3>
          <p data-de="{{FEATURE_2_TEXT_DE}}" data-en="{{FEATURE_2_TEXT_EN}}"></p>
        </div>

        <div class="feature-card">
          <h3 data-de="{{FEATURE_3_TITLE_DE}}" data-en="{{FEATURE_3_TITLE_EN}}"></h3>
          <p data-de="{{FEATURE_3_TEXT_DE}}" data-en="{{FEATURE_3_TEXT_EN}}"></p>
        </div>

      </div>
    </div>
  </section>

  <!-- ============================================================
       CTA (Solid Pill Button)
       ============================================================ -->
  <section class="cta-section">
    <div class="container center-block">
      <h2 data-de="{{CTA_HEADLINE_DE}}" data-en="{{CTA_HEADLINE_EN}}"></h2>
      <div style="margin-top: 36px;">
        <a class="btn-solid" href="{{CTA_BUTTON_URL_DE}}" data-href-de="{{CTA_BUTTON_URL_DE}}" data-href-en="{{CTA_BUTTON_URL_EN}}">
          <span data-de="{{CTA_BUTTON_LABEL_DE}}" data-en="{{CTA_BUTTON_LABEL_EN}}"></span>
          <span class="btn-solid__arrow" aria-hidden="true">&#8599;</span>
        </a>
      </div>
    </div>
  </section>

  <!-- ============================================================
       FOOTER (gesetzlicher Pflichttext — Firmierung/Adresse/Register
       bleiben sprachunabhängig identisch, nur die Rollen-Bezeichnung
       "Geschäftsführer" wird übersetzt)
       ============================================================ -->
  <footer class="footer">
    <img src="{{LOGO_URL}}" alt="MSE Filterpressen" style="width:140px; height:auto; margin:0 auto 20px auto;">
    <p>
      MSE Filterpressen GmbH &middot; Am Eisengraben 3 &middot; 75196 Remchingen &middot; Deutschland &middot;
      Tel. +49 (0) 7232 3650-0 &middot; info@mse-filterpressen.de &middot; mse-filterpressen.com &middot;
      <span data-de="Gesch&auml;ftsf&uuml;hrer" data-en="Managing Directors"></span>: Giuseppe Rum&eacute;, Riccardo Valerio Rum&eacute; &middot;
      Amtsgericht Mannheim HRB 502677 &middot; USt-IdNr. DE 144200297.
    </p>
  </footer>

  <!-- ============================================================
       SPRACHUMSCHALTER-LOGIK (vanilla JS, kein Framework, kein
       Build-Schritt). Beide Sprachversionen liegen bereits als
       data-de/data-en-Attribute im Dokument — der Switch tauscht nur
       den sichtbaren Text aus, es wird nichts nachgeladen und es gibt
       keine zweite Domain/Subdomain. Merkt sich die Wahl für den
       nächsten Besuch (localStorage), Default ist Deutsch.
       ============================================================ -->
  <script>
    (function () {
      var STORAGE_KEY = 'mse-landingpage-lang';
      var html = document.documentElement;
      // Titel kommen bewusst aus HTML-Attributen (data-title-de/-en), nicht aus einem
      // JS-String-Literal — Apostrophe in Titeln (z. B. "MSE's ...") würden ein einfach
      // gequotetes JS-String-Literal vorzeitig beenden und das gesamte Script mit einem
      // SyntaxError zum Absturz bringen. HTML-Attributwerte sind dagegen unempfindlich
      // gegenüber Apostrophen.

      function applyLang(lang) {
        html.setAttribute('lang', lang);
        document.title = (lang === 'en' ? html.getAttribute('data-title-en') : html.getAttribute('data-title-de')) || document.title;

        document.querySelectorAll('[data-de]').forEach(function (el) {
          var text = lang === 'en' ? el.getAttribute('data-en') : el.getAttribute('data-de');
          el.textContent = text || '';
        });

        // Sprachpassende Ziel-URLs (z. B. CTA-Button): DE = Root-Pfad, EN = /en/-Praefix-Variante
        // derselben Seite auf mse-filterpressen.com (siehe SKILL.md Abschnitt zur URL-Lokalisierung).
        document.querySelectorAll('[data-href-de]').forEach(function (el) {
          var href = lang === 'en' ? el.getAttribute('data-href-en') : el.getAttribute('data-href-de');
          if (href) { el.setAttribute('href', href); }
        });

        document.querySelectorAll('.lang-switch__btn').forEach(function (btn) {
          var isActive = btn.getAttribute('data-set-lang') === lang;
          btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        });

        try { localStorage.setItem(STORAGE_KEY, lang); } catch (e) { /* Privacy-Modus o. ä. — kein Problem, nur kein Merken */ }
      }

      document.querySelectorAll('.lang-switch__btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          applyLang(btn.getAttribute('data-set-lang'));
        });
      });

      var saved = null;
      try { saved = localStorage.getItem(STORAGE_KEY); } catch (e) { /* ignore */ }
      applyLang(saved === 'en' ? 'en' : 'de');
    })();
  </script>

</body>
</html>
